<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Briefly Focus Dashboard Artifact</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font-family: Georgia, "Times New Roman", serif;
        background: #f7efe2;
        color: #162129;
      }

      .card {
        max-width: 420px;
        padding: 24px;
        border: 1px solid rgba(22, 33, 41, 0.11);
        border-radius: 24px;
        background: rgba(255, 252, 247, 0.94);
      }

      .eyebrow,
      .score-label {
        color: #9d4021;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .score {
        float: right;
        padding: 8px 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #9d4021 0%, #662412 100%);
        color: #fff8ef;
        font-weight: 700;
      }

      ul {
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <div class="eyebrow">Focus Dashboard Artifact</div>
      <div class="score">78</div>
      <h1>Can you review the investor update?</h1>
      <p>Founder, Operator · 2 messages · updated Apr 13, 2026</p>
      <p>Can you review the attached update by tomorrow?</p>
      <ul>
        <li>Strong relationship with sender</li>
        <li>Direct ask detected</li>
        <li>Recent reply activity</li>
      </ul>
      <p class="score-label">Phase 1 explanation payload preview</p>
    </article>
  </body>
</html>
